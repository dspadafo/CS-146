<!DOCTYPE html>
<html lang="en">
<head>
    <title>Garden | Signup</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="./styles/signuplogin.css">
    <link rel="stylesheet" href="./styles/headerfooter.css">
    <script src="./scripts/signup.js" async></script>
</head>
<body>
    <header>
        <div id="title-tagline">
            <h1>Garden</h1>
            <p>Grow plants, grow productivity</p>
        </div>

        <nav aria-label="main">
            <a href="index.html">Home</a>
            <a href="./leaderboard.html">Leaderboard</a>
            <a href="./gallery.html">Gallery</a>
            <a href="./login.html">Log in</a>
        </nav>
    </header>

    <main>
        <section id="signup-box">
            <h1>Create a Garden account</h1>
            <form id="signup-form">
                <label for="username">Username</label>
                <input class="input-field" id="username" type="text" placeholder="fl0wer_fan">
                <label for="email">Email</label>
                <input class="input-field" id="email" type="email" placeholder="greenthumb@gmail.com">
                <label for="password">Password</label>
                <input class="input-field" id="password" type="password" placeholder="TulipsR0ck!101">
                
                <button id="submit-button" type="submit">Sign up</button>
                <input id="reset-button" type="reset" value="Reset">
                <p id="error"></p>
                <p><a href="./index.html">Take me back!</a> Or, <a href="./login.html">log back in.</a></p>
            </form>
        </section>
    </main>
    <footer>
        <p>2026 Garden</p>
    </footer>
</body>
</html>
