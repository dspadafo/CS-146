<!DOCTYPE html>
<head>
    <title>Garden | Signup</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="./styles/signup.css">
</head>
<body>
    <main>
        <section id="signup-box">
            <h1>Create a Garden account</h1>
            <form action="./index.html"> <!-- hitting the submit button opens the main page again for now -->
                <div id="form-items">
                    <label for="username">Username</label>
                    <input class="input-field" name="username" placeholder="fl0wer_fan">
                    <label for="email">Email</label>
                    <input class="input-field" name="email" type="email" placeholder="greenthumb@gmail.com">
                    <label for="password">Password</label>
                    <input class="input-field" name="password" type="password" placeholder="TulipsR0ck!101">
                </div>
                <input id="submit-button"type="submit" value="Create account">
                <a href="./index.html">Take me back!</a> 
                <!-- or smth else to go back home bc we have to be able to navigate to another page -->
            </form>
        </section>
    </main>
</body>
