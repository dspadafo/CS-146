<!DOCTYPE html>
<html lang="en">
<head>
    <title>Garden | Leaderboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/leaderboard.css">
    <link rel="stylesheet" href="./styles/headerfooter.css">
</head>
<body>
    <header>
        <div id="title-tagline">
            <h1>Garden</h1>
            <p>Grow plants, grow productivity</p>
        </div>

        <nav aria-label="main">
            <a href="index.html">Home</a>
            <a href="./leaderboard.html">Leaderboard</a>
            <a href="./gallery.html">Gallery</a>
            <a id="greet" href="./login.html">Login</a>
        </nav>
    </header>

    <main>
        <section id="leaderboard-box">
            <h2>Leaderboard</h2>

            <form id="search-form" autocomplete="off">
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search players..."
                    aria-label="Search players"
                >
            </form>

            <div id="leaderboard-header">
                <span>Name</span>
                <span>Score</span>
            </div>
            <ol id="leaderboard-items">
            </ol>

            <p id="no-results">No players found.</p>

        </section>
    </main>

    <footer>
        <p>2026 Garden</p>
    </footer>

    <script src="./scripts/leaderboard.js"></script>
    <script src="./scripts/logout.js"></script>
</body>
</html>
