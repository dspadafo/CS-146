<!DOCTYPE html>
<html lang="en">
<head>
    <title>Garden | Log In</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="./styles/signuplogin.css">
    <link rel="stylesheet" href="./styles/headerfooter.css">
</head>
<body>
    <header>
        <div id="title-tagline">
            <h1>Garden</h1>
            <p>Grow plants, grow productivity</p>
        </div>

        <nav aria-label="main">
            <a href="index.html">Home</a>
            <a href="./leaderboard.html">Leaderboard</a>
            <a href="./gallery.html">Gallery</a>
            <a id="greet" href="./login.html"></a>
        </nav>
    </header>

    <main>
        <section id="login-box">
            <h1>Welcome back!</h1>
            <form id="login-form">
                <label for="username">Username</label>
                <input class="input-field" id="username" type="text" placeholder="D1GARDENER">
                <label for="email">Email</label>
                <input class="input-field" id="email" type="email" placeholder="dontemailme@hotmail.com">
                <label for="password">Password</label>
                <input class="input-field" id="password" type="password" placeholder="abcd1234??">
                
                <button id="submit-button" type="submit">Sign in</button>
                <input id="reset-button" type="reset" value="Reset">
                <p id="error"></p>
                <p><a href="./signup.html">sign up today.</a></p>
            </form>
        </section>
    </main>
    <footer>
        <p>2026 Garden</p>
    </footer>
    <script src="./scripts/login.js"></script>
    <script src="./scripts/logout.js"></script>
</body>
</html>
